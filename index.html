<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCAA 2026 Fantasy Tracker</title>
    <style>
        :root {
            --color-background: #fcfcf9;
            --color-surface: #fffffd;
            --color-text: #13343b;
            --color-border: rgba(94, 82, 64, 0.2);
            --color-primary: #21808d;
        }
        
        * { box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background: var(--color-background);
            color: var(--color-text);
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 32px;
            font-weight: 600;
            margin: 0 0 8px 0;
        }
        
        .subtitle {
            color: #626c71;
            margin-bottom: 24px;
        }
        
        .leaderboard {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }
        
        .leaderboard h2 {
            font-size: 20px;
            font-weight: 600;
            margin: 0 0 16px 0;
        }
        
        .leaderboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }
        
        .owner-card {
            padding: 12px;
            background: rgba(33, 128, 141, 0.08);
            border: 1px solid rgba(33, 128, 141, 0.2);
            border-radius: 8px;
        }
        
        .owner-name {
            font-weight: 600;
            font-size: 14px;
        }
        
        .owner-points {
            font-size: 24px;
            font-weight: 600;
            color: var(--color-primary);
            margin: 4px 0;
        }
        
        .owner-rank {
            font-size: 12px;
            color: #626c71;
        }
        
        .controls {
            margin-bottom: 16px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 8px 16px;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        button:hover {
            opacity: 0.85;
        }
        
        .table-container {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            overflow: hidden;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        thead {
            background: rgba(94, 82, 64, 0.06);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        th {
            padding: 12px 8px;
            text-align: left;
            font-weight: 600;
            border-bottom: 1px solid var(--color-border);
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        
        th:hover {
            background: rgba(94, 82, 64, 0.1);
        }
        
        td {
            padding: 10px 8px;
            border-bottom: 1px solid rgba(94, 82, 64, 0.1);
        }
        
        tr:hover {
            background: rgba(33, 128, 141, 0.04);
        }
        
        .team-cell {
            font-weight: 500;
            padding: 8px;
            border-radius: 4px;
        }
        
        .editable {
            background: rgba(33, 128, 141, 0.08);
            border: 1px solid transparent;
            padding: 6px;
            border-radius: 4px;
            min-width: 60px;
            text-align: center;
        }
        
        .editable:focus {
            outline: 2px solid var(--color-primary);
            background: white;
        }
        
        .total-col {
            font-weight: 600;
            color: var(--color-primary);
            font-size: 14px;
        }
        
        .sort-indicator {
            margin-left: 4px;
            font-size: 10px;
        }
    </style>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>

    <div class="container">

        <p class="subtitle">

        <div class="leaderboard">

        <div class="controls">

const STORAGE_KEY = "fantasy2026_players";

function loadFromStorage() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return;
    try {
        const stored = JSON.parse(saved);
        players.forEach(p => {
            const data = stored[p.key];
            if (!data) return;
            p.owner = data.owner ?? p.owner;
            p.r64 = data.r64 ?? p.r64;
            p.r32 = data.r32 ?? p.r32;
            p.s16 = data.s16 ?? p.s16;
            p.e8 = data.e8 ?? p.e8;
            p.f4 = data.f4 ?? p.f4;
            p.champ = data.champ ?? p.champ;
        });
    } catch (e) {
        console.error("Bad storage data", e);
    }
}

function saveToStorage() {
    const byKey = {};
    players.forEach(p => {
        byKey[p.key] = {
            owner: p.owner || "",
            r64: p.r64 || 0,
            r32: p.r32 || 0,
            s16: p.s16 || 0,
            e8: p.e8 || 0,
            f4: p.f4 || 0,
            champ: p.champ || 0
        };
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(byKey));
}

function downloadExcel() {
    const excelData = players.map(p => ({
        Region: p.region,
        Seed: p.seed,
        Team: p.team,
        Player: p.player,
        PPG: p.ppg,
        "Expected Games": getExpectedGames(p).toFixed(2),
        "Expected Points": getExpectedPoints(p).toFixed(1),
        Owner: p.owner || '',
        R64: p.r64 || 0,
        R32: p.r32 || 0,
        S16: p.s16 || 0,
        E8: p.e8 || 0,
        F4: p.f4 || 0,
        Champ: p.champ || 0,
        Total: calculateTotal(p).toFixed(1)
    }));

    const ws = XLSX.utils.json_to_sheet(excelData);

    ws["!cols"] = [
        { wch: 10 }, // Region
        { wch: 6 },  // Seed
        { wch: 22 }, // Team
        { wch: 22 }, // Player
        { wch: 8 },  // PPG
        { wch: 12 }, // Expected Games
        { wch: 14 }, // Expected Points
        { wch: 12 }, // Owner
        { wch: 6 },  // R64
        { wch: 6 },  // R32
        { wch: 6 },  // S16
        { wch: 6 },  // E8
        { wch: 6 },  // F4
        { wch: 8 },  // Champ
        { wch: 10 }  // Total
    ];

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Fantasy Tracker 2026");
    XLSX.writeFile(wb, "NCAA_Fantasy_Tracker_2026.xlsx");
}

function getExpectedGames(player) {
    if (typeof player.expGames === 'number' && !isNaN(player.expGames)) {
        return player.expGames;
    }
    const base = defaultExpectedGamesBySeed[player.seed] || 1.0;
    player.expGames = base;
    return base;
}

function getExpectedPoints(player) {
    const games = getExpectedGames(player);
    const exp = player.ppg * games;
    return exp.toFixed(1);
}

// all round factors are effectively 1 here
function calculateTotal(player) {
    return (parseFloat(player.r64) || 0) +
           (parseFloat(player.r32) || 0) +
           (parseFloat(player.s16) || 0) +
           (parseFloat(player.e8) || 0) +
           (parseFloat(player.f4) || 0) +
           (parseFloat(player.champ) || 0);
}

function renderTable() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';

    players.forEach((p, index) => {
        const row = tbody.insertRow();
        row.innerHTML = `
            <td>${p.region}</td>
            <td>${p.seed}</td>
            <td class="team-cell" style="background-color: ${p.fillColor}; color: ${p.fontColor};">${p.team}</td>
            <td>${p.player}</td>
            <td>${p.ppg}</td>
            <td contenteditable="true" class="editable" data-index="${index}" data-field="expGames">${getExpectedGames(p)}</td>
            <td>${getExpectedPoints(p)}</td>
            <td contenteditable="true" class="editable" data-index="${index}" data-field="owner">${p.owner || ''}</td>
            <td contenteditable="true" class="editable" data-index="${index}" data-field="r64">${p.r64 || ''}</td>
            <td contenteditable="true" class="editable" data-index="${index}" data-field="r32">${p.r32 || ''}</td>
            <td contenteditable="true" class="editable" data-index="${index}" data-field="s16">${p.s16 || ''}</td>
            <td contenteditable="true" class="editable" data-index="${index}" data-field="e8">${p.e8 || ''}</td>
            <td contenteditable="true" class="editable" data-index="${index}" data-field="f4">${p.f4 || ''}</td>
            <td contenteditable="true" class="editable" data-index="${index}" data-field="champ">${p.champ || ''}</td>
            <td class="total-col">${calculateTotal(p)}</td>
        `;
    });

    document.querySelectorAll('.editable').forEach(cell => {
        cell.addEventListener('blur', function() {
            const index = parseInt(this.dataset.index, 10);
            const field = this.dataset.field;
            const value = this.textContent.trim();

            if (field === 'owner') {
                players[index][field] = value;
            } else if (field === 'expGames') {
                const num = parseFloat(value);
                const safe = isNaN(num)
                    ? defaultExpectedGamesBySeed[players[index].seed] || 1.0
                    : num;
                players[index][field] = safe;
                this.textContent = safe.toFixed(1);
            } else {
                players[index][field] = parseFloat(value) || 0;
            }

            // update total cell in-place
            const row = this.parentElement;
            const totalCell = row.querySelector('.total-col');
            if (totalCell) {
                totalCell.textContent = calculateTotal(players[index]);
            }

            saveToStorage();
            updateLeaderboard();
        });
    });
}

function recalculate() {
    // recalc totals in-place without rebuilding table
    const tbody = document.getElementById('tableBody');
    Array.from(tbody.rows).forEach((row, index) => {
        const totalCell = row.querySelector('.total-col');
        if (totalCell) {
            totalCell.textContent = calculateTotal(players[index]);
        }
    });
    updateLeaderboard();
}

function updateLeaderboard() {
    const ownerTotals = {};
    players.forEach(p => {
        if (p.owner) {
            ownerTotals[p.owner] = (ownerTotals[p.owner] || 0) + calculateTotal(p);
        }
    });

    const sorted = Object.entries(ownerTotals).sort((a, b) => b[1] - a[1]);
    const leaderboard = document.getElementById('leaderboard');

    if (sorted.length === 0) {
        leaderboard.innerHTML = '<div class="ownerx-card"><div class="owner-rank">Add owners to see standings</div></div>';
        return;
    }

    leaderboard.innerHTML = sorted.map(([owner, points], i) => `
        <div class="owner-card">
            <div class="owner-rank">#${i + 1}</div>
            <div class="owner-name">${owner}</div>
            <div class="owner-points">${points}</div>
        </div>
    `).join('');
}

function sortTable(columnIndex) {
    const table = document.getElementById('fantasyTable');
    const tbody = table.querySelector('tbody');
    const rows = Array.from(tbody.querySelectorAll('tr'));

    rows.sort((a, b) => {
        let aVal = a.cells[columnIndex].textContent.trim();
        let bVal = b.cells[columnIndex].textContent.trim();

        const aNum = parseFloat(aVal);
        const bNum = parseFloat(bVal);

        if (columnIndex === 1) {
            // Seed: ascending
            if (!isNaN(aNum) && !isNaN(bNum)) {
                return aNum - bNum;
            }
        }

        if (!isNaN(aNum) && !isNaN(bNum)) {
            // All other numeric columns: descending
            return bNum - aNum;
        }

        return aVal.localeCompare(bVal);
    });

    rows.forEach(row => tbody.appendChild(row));
}

    document.addEventListener('DOMContentLoaded', () => {
        loadFromStorage();
        renderTable();
        updateLeaderboard();
    });
    </script>
</body>
</html>
