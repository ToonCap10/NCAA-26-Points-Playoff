<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NCAA Fantasy Tracker 2026</title>
    <style>
        :root {
            --color-background: #fcfcf9;
            --color-surface: #fffffd;
            --color-text: #13343b;
            --color-border: rgba(94, 82, 64, 0.2);
            --color-primary: #21808d;
        }
        
        * { box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background: var(--color-background);
            color: var(--color-text);
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 32px;
            font-weight: 600;
            margin: 0 0 8px 0;
        }
        
        .subtitle {
            color: #626c71;
            margin-bottom: 24px;
        }
        
        .leaderboard {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }
        
        .leaderboard h2 {
            font-size: 20px;
            font-weight: 600;
            margin: 0 0 16px 0;
        }
        
        .leaderboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }
        
        .owner-card {
            padding: 12px;
            background: rgba(33, 128, 141, 0.08);
            border: 1px solid rgba(33, 128, 141, 0.2);
            border-radius: 8px;
        }
        
        .owner-name {
            font-weight: 600;
            font-size: 14px;
        }
        
        .owner-points {
            font-size: 24px;
            font-weight: 600;
            color: var(--color-primary);
            margin: 4px 0;
        }
        
        .owner-rank {
            font-size: 12px;
            color: #626c71;
        }
        
        .controls {
            margin-bottom: 16px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 8px 16px;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        button:hover {
            opacity: 0.85;
        }
        
        .table-container {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            overflow: hidden;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        thead {
            background: rgba(94, 82, 64, 0.06);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        th {
            padding: 12px 8px;
            text-align: left;
            font-weight: 600;
            border-bottom: 1px solid var(--color-border);
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        
        th:hover {
            background: rgba(94, 82, 64, 0.1);
        }
        
        td {
            padding: 10px 8px;
            border-bottom: 1px solid rgba(94, 82, 64, 0.1);
        }
        
        tr:hover {
            background: rgba(33, 128, 141, 0.04);
        }
        
        .team-cell {
            font-weight: 500;
            padding: 8px;
            border-radius: 4px;
        }
        
        .editable {
            background: rgba(33, 128, 141, 0.08);
            border: 1px solid transparent;
            padding: 6px;
            border-radius: 4px;
            min-width: 60px;
            text-align: center;
        }
        
        .editable:focus {
            outline: 2px solid var(--color-primary);
            background: white;
        }
        
        .total-col {
            font-weight: 600;
            color: var(--color-primary);
            font-size: 14px;
        }
        
        .sort-indicator {
            margin-left: 4px;
            font-size: 10px;
        }
    </style>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>🏀 NCAA 2026 Fantasy Tournament Tracker</h1>
        <p class="subtitle">
            Click column headers to sort • Click cells to edit owner names, round points, or expected games
        </p>
        
        <div class="leaderboard">
            <h2>Owner Leaderboard</h2>
            <div class="leaderboard-grid" id="leaderboard">
                <div class="owner-card">
                    <div class="owner-rank">Add owners to see standings</div>
                </div>
            </div>
        </div>

<div class="round-inputs">
    <div>
        <label>Round of 64 factor:
            <input type="number" id="r64-factor" value="1" step="0.1" onchange="recalculate()" />
        </label>
    </div>
    <div>
        <label>Round of 32 factor:
            <input type="number" id="r32-factor" value="1" step="0.1" onchange="recalculate()" />
        </label>
    </div>
    <div>
        <label>Sweet 16 factor:
            <input type="number" id="s16-factor" value="1" step="0.1" onchange="recalculate()" />
        </label>
    </div>
    <div>
        <label>Elite 8 factor:
            <input type="number" id="e8-factor" value="1" step="0.1" onchange="recalculate()" />
        </label>
    </div>
    <div>
        <label>Final Four factor:
            <input type="number" id="f4-factor" value="1" step="0.1" onchange="recalculate()" />
        </label>
    </div>
    <div>
        <label>Championship factor:
            <input type="number" id="champ-factor" value="1" step="0.1" onchange="recalculate()" />
        </label>
    </div>
</div>

<div class="controls">
    <button onclick="recalculate()">Recalculate Totals</button>
    <button onclick="resetBracket()">Reset Bracket Outcomes</button>
    <button onclick="downloadExcel()">Download Excel</button>
    <div class="search-owner">
        <label for="owner-filter">Filter by Owner:</label>
        <select id="owner-filter" onchange="renderTable()">
            <option value="">All</option>
            <option value="Sam">Sam</option>
            <option value="Tom">Tom</option>
            <option value="Terry">Terry</option>
            <option value="Brandon">Brandon</option>
            <option value="Greg">Greg</option>
            <option value="Jeff">Jeff</option>
            <option value="Alex">Alex</option>
        </select>
    </div>
</div>

<table id="players-table">
    <thead>
    <tr>
        <th class="sortable" onclick="sortTable('region')">Region</th>
        <th class="sortable" onclick="sortTable('seed')">Seed</th>
        <th class="sortable" onclick="sortTable('team')">Team</th>
        <th class="sortable" onclick="sortTable('player')">Player</th>
        <th class="sortable" onclick="sortTable('ppg')">PPG</th>
        <th>Expected Games</th>
        <th>Expected Points</th>
        <th class="sortable" onclick="sortTable('owner')">Owner</th>
        <th>R64</th>
        <th>R32</th>
        <th>S16</th>
        <th>E8</th>
        <th>F4</th>
        <th>Champ</th>
        <th class="sortable" onclick="sortTable('total')">Total</th>
    </tr>
    </thead>
    <tbody>
    <!-- Filled by JS -->
    </tbody>
</table>

<div class="leaderboard" id="leaderboard">
    <h2>Owner Leaderboard</h2>
    <div id="leaderboard-content"></div>
</div>

// localStorage key
const STORAGE_KEY = "fantasy2026_players";

// load saved data from localStorage
function loadFromStorage() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return;
    try {
        const stored = JSON.parse(saved);
        stored.forEach((p, i) => {
            if (!players[i]) return;
            players[i].owner = p.owner ?? players[i].owner;
            players[i].r64 = p.r64 ?? players[i].r64;
            players[i].r32 = p.r32 ?? players[i].r32;
            players[i].s16 = p.s16 ?? players[i].s16;
            players[i].e8 = p.e8 ?? players[i].e8;
            players[i].f4 = p.f4 ?? players[i].f4;
            players[i].champ = p.champ ?? players[i].champ;
        });
    } catch (e) {
        console.error("Bad storage data", e);
    }
}

// save only fields that change to localStorage
function saveToStorage() {
    const minimal = players.map(p => ({
        owner: p.owner || "",
        r64: p.r64 || 0,
        r32: p.r32 || 0,
        s16: p.s16 || 0,
        e8: p.e8 || 0,
        f4: p.f4 || 0,
        champ: p.champ || 0
    }));
    localStorage.setItem(STORAGE_KEY, JSON.stringify(minimal));
}

// default expected games by seed
let defaultExpectedGamesBySeed = {
    1: 4.0, 2: 3.5, 3: 3.0, 4: 2.7,
    5: 2.5, 6: 2.3, 7: 2.1, 8: 2.0,
    9: 1.8, 10: 1.7, 11: 1.6, 12: 1.5,
    13: 1.4, 14: 1.3, 15: 1.2, 16: 1.1
};

function updateDefaultExpectedGames() {
    const input = document.getElementById('default-exp-games').value.trim();
    if (!input) return;
    const parts = input.split(',').map(p => parseFloat(p.trim())).filter(p => !isNaN(p));
    if (parts.length !== 16) {
        alert("Please enter exactly 16 numeric values for seeds 1-16.");
        return;
    }
    const newMap = {};
    for (let i = 0; i < 16; i++) newMap[i + 1] = parts[i];
    defaultExpectedGamesBySeed = newMap;
    recalculate();
}

function getExpectedGames(player) {
    if (player.expGames != null && !isNaN(player.expGames)) return parseFloat(player.expGames);
    return defaultExpectedGamesBySeed[player.seed] || 1.0;
}

function getExpectedPoints(player) {
    return player.ppg * getExpectedGames(player);
}

// all round factors = 1 (1 point always = 1 point)
function calculateTotal(player) {
    let r64 = parseFloat(player.r64 || 0);
    let r32 = parseFloat(player.r32 || 0);
    let s16 = parseFloat(player.s16 || 0);
    let e8 = parseFloat(player.e8 || 0);
    let f4 = parseFloat(player.f4 || 0);
    let champ = parseFloat(player.champ || 0);

    const r64Factor = 1;
    const r32Factor = 1;
    const s16Factor = 1;
    const e8Factor = 1;
    const f4Factor = 1;
    const champFactor = 1;

    return (r64 * r64Factor) +
           (r32 * r32Factor) +
           (s16 * s16Factor) +
           (e8 * e8Factor) +
           (f4 * f4Factor) +
           (champ * champFactor);
}

function getRegionClass(region) {
    const r = region.toLowerCase();
    if (r === "east") return "east-row";
    if (r === "west") return "west-row";
    if (r === "south") return "south-row";
    if (r === "midwest") return "midwest-row";
    return "";
}

function renderTable() {
    const tbody = document.querySelector("#players-table tbody");
    tbody.innerHTML = "";

    const ownerFilter = document.getElementById('owner-filter').value;

    players.forEach((player) => {
        if (ownerFilter && player.owner !== ownerFilter) return;

        const tr = document.createElement("tr");
        const regionClass = getRegionClass(player.region);
        if (regionClass) tr.classList.add(regionClass);

        const regionTd = document.createElement("td");
        regionTd.textContent = player.region;
        tr.appendChild(regionTd);

        const seedTd = document.createElement("td");
        seedTd.textContent = player.seed;
        tr.appendChild(seedTd);

        const teamTd = document.createElement("td");
        teamTd.textContent = player.team;
        tr.appendChild(teamTd);

        const playerTd = document.createElement("td");
        playerTd.textContent = player.player;
        tr.appendChild(playerTd);

        const ppgTd = document.createElement("td");
        ppgTd.textContent = player.ppg.toFixed(1);
        tr.appendChild(ppgTd);

        const expGamesTd = document.createElement("td");
        expGamesTd.textContent = getExpectedGames(player).toFixed(2);
        tr.appendChild(expGamesTd);

        const expPtsTd = document.createElement("td");
        expPtsTd.textContent = getExpectedPoints(player).toFixed(1);
        tr.appendChild(expPtsTd);

        // Editable owner cell with persistence
        const ownerTd = document.createElement("td");
        const ownerInput = document.createElement("input");
        ownerInput.type = "text";
        ownerInput.value = player.owner || "";
        ownerInput.onchange = () => {
            player.owner = ownerInput.value;
            updateLeaderboard();
            saveToStorage();
        };
        ownerTd.appendChild(ownerInput);
        tr.appendChild(ownerTd);

        // Round inputs, also persistent
        ["r64","r32","s16","e8","f4","champ"].forEach(round => {
            const td = document.createElement("td");
            const input = document.createElement("input");
            input.type = "number";
            input.step = "0.1";
            input.value = player[round] != null ? player[round] : "";
            input.onchange = () => {
                player[round] = parseFloat(input.value) || 0;
                totalTd.textContent = calculateTotal(player).toFixed(1);
                updateLeaderboard();
                saveToStorage();
            };
            td.appendChild(input);
            tr.appendChild(td);
        });

        const totalTd = document.createElement("td");
        totalTd.textContent = calculateTotal(player).toFixed(1);
        tr.appendChild(totalTd);

        tbody.appendChild(tr);
    });

    updateLeaderboard();
}

function updateLeaderboard() {
    const ownerTotals = {};
    players.forEach(p => {
        const key = p.owner || "";
        const total = calculateTotal(p);
        if (!ownerTotals[key]) ownerTotals[key] = 0;
        ownerTotals[key] += total;
    });

    const sortedOwners = Object.entries(ownerTotals).sort((a, b) => b[1] - a[1]);
    const leaderboardDiv = document.getElementById("leaderboard-content");
    leaderboardDiv.innerHTML = "";

    const table = document.createElement("table");
    table.style.width = "100%";
    const thead = document.createElement("thead");
    const headRow = document.createElement("tr");
    ["Owner", "Total Points"].forEach(text => {
        const th = document.createElement("th");
        th.textContent = text;
        headRow.appendChild(th);
    });
    thead.appendChild(headRow);
    table.appendChild(thead);

    const tbody = document.createElement("tbody");
    sortedOwners.forEach(([owner, total]) => {
        const tr = document.createElement("tr");
        const ownerTd = document.createElement("td");
        ownerTd.textContent = owner;
        const totalTd = document.createElement("td");
        totalTd.textContent = total.toFixed(1);
        totalTd.classList.add("right");
        tr.appendChild(ownerTd);
        tr.appendChild(totalTd);
        tbody.appendChild(tr);
    });
    table.appendChild(tbody);

    leaderboardDiv.appendChild(table);
}

let currentSort = { key: null, asc: true };

function sortTable(key) {
    if (currentSort.key === key) {
        currentSort.asc = !currentSort.asc;
    } else {
        currentSort.key = key;
        currentSort.asc = true;
    }

    players.sort((a, b) => {
        let valA, valB;
        if (key === 'total') {
            valA = calculateTotal(a);
            valB = calculateTotal(b);
        } else if (key === 'ppg') {
            valA = a.ppg;
            valB = b.ppg;
        } else if (key === 'seed') {
            valA = a.seed;
            valB = b.seed;
        } else if (['region','team','player','owner'].includes(key)) {
            valA = a[key] || "";
            valB = b[key] || "";
            if (valA < valB) return currentSort.asc ? -1 : 1;
            if (valA > valB) return currentSort.asc ? 1 : -1;
            return 0;
        } else {
            valA = a[key];
            valB = b[key];
        }
        return currentSort.asc ? valA - valB : valB - valA;
    });

    renderTable();
}

function recalculate() {
    renderTable();
}

function resetBracket() {
    players.forEach(p => {
        p.r64 = 0;
        p.r32 = 0;
        p.s16 = 0;
        p.e8 = 0;
        p.f4 = 0;
        p.champ = 0;
    });
    saveToStorage();
    renderTable();
}

// Excel download
function downloadExcel() {
    const excelData = players.map(p => ({
        Region: p.region,
        Seed: p.seed,
        Team: p.team,
        Player: p.player,
        PPG: p.ppg,
        "Expected Games": getExpectedGames(p).toFixed(2),
        "Expected Points": getExpectedPoints(p).toFixed(1),
        Owner: p.owner || "",
        R64: p.r64 || 0,
        R32: p.r32 || 0,
        S16: p.s16 || 0,
        E8: p.e8 || 0,
        F4: p.f4 || 0,
        Champ: p.champ || 0,
        Total: calculateTotal(p).toFixed(1)
    }));

    const ws = XLSX.utils.json_to_sheet(excelData);

    ws["!cols"] = [
        { wch: 10 }, // Region
        { wch: 6 },  // Seed
        { wch: 22 }, // Team
        { wch: 22 }, // Player
        { wch: 8 },  // PPG
        { wch: 12 }, // Expected Games
        { wch: 14 }, // Expected Points
        { wch: 12 }, // Owner
        { wch: 6 },  // R64
        { wch: 6 },  // R32
        { wch: 6 },  // S16
        { wch: 6 },  // E8
        { wch: 6 },  // F4
        { wch: 8 },  // Champ
        { wch: 10 }  // Total
    ];

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Fantasy Tracker 2026");
    XLSX.writeFile(wb, "NCAA_Fantasy_Tracker_2026.xlsx");
}

// initial load + render
loadFromStorage();
renderTable();
</script>
